name: Leaf-Installer

on:
  push:
    branches:
      - "*"
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkita64:latest

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Mark repo as safe directory
        run: git config --system --add safe.directory '*'

      - name: Build Leaf
        run: make -j"$(nproc)" all

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: Leaf-Installer
          path: Leaf-Installer.nro
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'

    permissions:
      contents: write

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: Leaf-Installer
          path: dist

      - name: Create zip package (max compression)
        run: |
          mkdir -p staging/switch/Leaf-Installer
          cp dist/Leaf-Installer.nro staging/switch/Leaf-Installer/Leaf-Installer.nro
          cd staging
          zip -9 -r ../dist/Leaf-Installer.zip switch

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/Leaf-Installer.zip
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') }}
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

